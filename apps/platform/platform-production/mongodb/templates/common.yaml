---
# Source: mongodb/templates/common.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: mongodb
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/version: "7.0"
    helm.sh/chart: mongodb-0.1.0
  namespace: platform-production
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: mongodb
      app.kubernetes.io/instance: mongodb
  template:
    metadata:
      annotations: 
        checksum/configMaps: ff3eaac0bfbf772a9b1893b30fb9bcc7e5cd130df83572276d0eb32809b009d7
      labels: 
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: mongodb
        app.kubernetes.io/name: mongodb
    spec: 
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      imagePullSecrets: 
        - name: cr-spydersoft-github
      containers: 
        - env:
          - name: MONGO_INITDB_DATABASE
            value: audit
          envFrom:
          - secretRef:
              name: mongodb-secrets
          image: mongo:7
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 90
            periodSeconds: 30
            tcpSocket:
              port: 27017
            timeoutSeconds: 3
          name: main
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 60
            periodSeconds: 10
            tcpSocket:
              port: 27017
            timeoutSeconds: 3
          volumeMounts:
          - mountPath: /data/db
            name: mongo-data
          - mountPath: /docker-entrypoint-initdb.d/init-audit-user.js
            name: mongo-init-data
            subPath: init-audit-user.js
          - mountPath: /mongodb-secrets
            name: mongodb-secrets
      volumes: 
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongodb
        - configMap:
            name: mongodb
          name: mongo-init-data
        - name: mongodb-secrets
          secret:
            secretName: mongodb-secrets

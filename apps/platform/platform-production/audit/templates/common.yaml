# Source: audit/templates/common.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-app-audit-api
  labels:
    app.kubernetes.io/controller: audit-api
    app.kubernetes.io/instance: audit-app
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: audit-app
    app.kubernetes.io/version: 1.0.1
    helm.sh/chart: audit-1.0.1
  namespace: platform-production
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: audit-api
      app.kubernetes.io/name: audit-app
      app.kubernetes.io/instance: audit-app
  template:
    metadata:
      annotations: 
        checksum/configMaps: f8638af11af562bd0ff700e21fd9d027ee62b7339fc6a2f84303bc22330780c5
      labels: 
        app.kubernetes.io/controller: audit-api
        app.kubernetes.io/instance: audit-app
        app.kubernetes.io/name: audit-app
    spec: 
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      imagePullSecrets: 
        - name: cr-spydersoft-github
      containers: 
        - envFrom:
          - secretRef:
              name: audit-secrets
          - configMapRef:
              name: audit-app
          image: ghcr.io/spydersoft-consulting/audit-api:1.0.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
          name: main
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 5m

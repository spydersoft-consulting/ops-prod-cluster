apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-app
  labels:
    app.kubernetes.io/instance: audit-app
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: audit-app
    app.kubernetes.io/version: 1.0.1
    helm.sh/chart: audit-1.0.1
  namespace: platform-production

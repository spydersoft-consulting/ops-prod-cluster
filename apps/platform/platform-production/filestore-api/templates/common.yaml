    app.kubernetes.io/version: 1.0.0
    helm.sh/chart: filestore-api-1.0.0
  namespace: platform-production
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
  hostnames:
    - "filestore.mattgerega.com"
  rules:
    - backendRefs:
      - group: ""
        kind: Service
        name: filestore-app
        namespace: platform-production
        port: 80
        weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /

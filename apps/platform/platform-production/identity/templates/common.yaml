# Source: identity/templates/common.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-app-admin-api
  labels:
    app.kubernetes.io/controller: admin-api
    app.kubernetes.io/instance: identity-app
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: identity-app
    app.kubernetes.io/version: 3.1.5
    helm.sh/chart: identity-3.1.5
  namespace: platform-production
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: admin-api
      app.kubernetes.io/name: identity-app
      app.kubernetes.io/instance: identity-app
  template:
    metadata:
      annotations: 
        checksum/configMaps: b1115b4e51aa0c7e4c24e85a017c9a40bab75a3ec5c57def03c43e5a7337e67f
      labels: 
        app.kubernetes.io/controller: admin-api
        app.kubernetes.io/instance: identity-app
        app.kubernetes.io/name: identity-app
    spec: 
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      imagePullSecrets: 
        - name: cr-spydersoft-github
      containers: 
        - envFrom:
          - configMapRef:
              name: identity-app-admin-api
          - secretRef:
              name: identity-server-admin-api-secrets
          image: ghcr.io/spyder007/identity_admin_api:3.1.5
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
          name: main
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1

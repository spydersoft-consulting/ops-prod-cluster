apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-ipmanager-app-api
  labels:
    app.kubernetes.io/controller: api
    app.kubernetes.io/instance: unifi-ipmanager-app
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: unifi-ipmanager-app
    app.kubernetes.io/version: 1.1.1-beta.136
    helm.sh/chart: unifi-ipmanager-1.1.1-beta.136
  namespace: production
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: api
      app.kubernetes.io/name: unifi-ipmanager-app
      app.kubernetes.io/instance: unifi-ipmanager-app
  template:
    metadata:
      annotations: 
        checksum/configMaps: 0dcea50de498bcb435018f38edbcc960edfe93d1b29225aaa7a0fdef4826d74b
      labels: 
        app.kubernetes.io/controller: api
        app.kubernetes.io/instance: unifi-ipmanager-app
        app.kubernetes.io/name: unifi-ipmanager-app
    spec: 
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      imagePullSecrets: 
        - name: cr-spydersoft-github
      containers: 
        - envFrom:
          - configMapRef:
              name: home-automation-common-config
          - configMapRef:
              name: unifi-ipmanager-app-ipmanager
          - secretRef:
              name: unifi-secrets
          image: ghcr.io/spyder007/unifi-ipmanager:1.1.1-beta.136
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          name: main
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          volumeMounts:
          - mountPath: /usr/share/nginx/html/config.js
            name: config-js
            subPath: config.js
      volumes: 
        - configMap:
            name: unifi-ipmanager-app-config-js
          name: config-js

    app.kubernetes.io/version: 1.1.1-beta.136
    helm.sh/chart: unifi-ipmanager-1.1.1-beta.136
  namespace: production
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
  hostnames:
    - "api.mattgerega.com"
  rules:
    - backendRefs:
      - group: ""
        kind: Service
        name: unifi-ipmanager-app-api
        namespace: production
        port: 80
        weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /unifi/ipmanager
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              replacePrefixMatch: /
              type: ReplacePrefixMatch

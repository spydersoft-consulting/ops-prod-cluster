    app.kubernetes.io/version: 1.0.9
    helm.sh/chart: techradar-data-0.1.0
  namespace: ra-production-techradar
spec:
  accessModes:
    - "ReadWriteMany"
  resources:
    requests:
      storage: "300Gi"
  storageClassName: "nfs-client"
---
# Source: techradar-data/templates/common.yaml
apiVersion: v1
kind: Service
metadata:
  name: techradar-data-postgres
  labels:
    app.kubernetes.io/instance: techradar-data
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: techradar-data
    app.kubernetes.io/service: techradar-data-postgres

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pitstop-app-data-api
  labels:
    app.kubernetes.io/controller: data-api
    app.kubernetes.io/instance: pitstop-app
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: pitstop-app
    app.kubernetes.io/version: 2.0.1
    helm.sh/chart: pitstop-2.0.1
  namespace: pitstop-production
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: data-api
      app.kubernetes.io/name: pitstop-app
      app.kubernetes.io/instance: pitstop-app
  template:
    metadata:
      annotations: 
        checksum/configMaps: a9e2b1413b3947c01f02b5f806931e51853261aae3857546767ef393e4643d30
      labels: 
        app.kubernetes.io/controller: data-api
        app.kubernetes.io/instance: pitstop-app
        app.kubernetes.io/name: pitstop-app
    spec: 
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      imagePullSecrets: 
        - name: cr-spydersoft-github
      containers: 
        - envFrom:
          - secretRef:
              name: data-api-secrets
          - configMapRef:
              name: pitstop-app-common
          - configMapRef:
              name: pitstop-app-data-api
          image: ghcr.io/spydersoft-consulting/pitstop-data-api:2.0.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          name: main
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1

---
# Source: pitstop-data/templates/common.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: pitstop-data
  labels:
    app.kubernetes.io/instance: pitstop-data
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: pitstop-data
    app.kubernetes.io/version: 0.0.0
    helm.sh/chart: pitstop-data-0.1.0
  namespace: pitstop-production
data:
  init-data.sh: |
    #!/bin/bash
    set -e;
    if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
        GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        ALTER DATABASE ${POSTGRES_DB} OWNER TO "${POSTGRES_NON_ROOT_USER}";
    EOSQL
    else
      echo "SETUP INFO: No environment variables given!"
    fi
---
# Source: pitstop-data/templates/common.yaml
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: pitstop-data
  labels:
    app.kubernetes.io/instance: pitstop-data
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: pitstop-data
    app.kubernetes.io/version: 0.0.0
    helm.sh/chart: pitstop-data-0.1.0
  namespace: pitstop-production
spec:
  accessModes:
    - "ReadWriteMany"
  resources:
    requests:
      storage: "10Gi"
  storageClassName: "nfs-client"
---
# Source: pitstop-data/templates/common.yaml
apiVersion: v1
kind: Service
metadata:
  name: pitstop-data-postgres
  labels:
    app.kubernetes.io/instance: pitstop-data
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: pitstop-data
    app.kubernetes.io/service: pitstop-data-postgres
    app.kubernetes.io/version: 0.0.0
    helm.sh/chart: pitstop-data-0.1.0
  namespace: pitstop-production
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/controller: postgres
    app.kubernetes.io/instance: pitstop-data
    app.kubernetes.io/name: pitstop-data
---
# Source: pitstop-data/templates/common.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pitstop-data-postgres
  labels:
    app.kubernetes.io/controller: postgres
    app.kubernetes.io/instance: pitstop-data
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: pitstop-data
    app.kubernetes.io/version: 0.0.0
    helm.sh/chart: pitstop-data-0.1.0
  namespace: pitstop-production
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: postgres
      app.kubernetes.io/name: pitstop-data
      app.kubernetes.io/instance: pitstop-data
  template:
    metadata:
      annotations: 
        checksum/configMaps: ed74e4086bff9b5df5fd05049cade90ad26b5c6600f694e6cb9bffdd7ebd3b52
        linkerd.io/inject: disabled
      labels: 
        app.kubernetes.io/controller: postgres
        app.kubernetes.io/instance: pitstop-data
        app.kubernetes.io/name: pitstop-data
    spec: 
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      imagePullSecrets: 
        - name: cr-spydersoft-github
      containers: 
        - env:
          - name: POSTGRES_PORT
            value: "5432"
          - name: POSTGRES_HOST
            value: postgres-service
          - name: POSTGRES_DB
            value: pitstop
          envFrom:
          - secretRef:
              name: postgres-secrets
          image: postgres:17
          imagePullPolicy: IfNotPresent
          name: main
          volumeMounts:
          - mountPath: /var/lib/postgresql/data
            name: postgres-data
          - mountPath: /docker-entrypoint-initdb.d/init-pitstop-user.sh
            name: postgres-init-data
            subPath: init-data.sh
      volumes: 
        - name: postgres-data
          persistentVolumeClaim:
            claimName: pitstop-data
        - configMap:
            name: pitstop-data
          name: postgres-init-data

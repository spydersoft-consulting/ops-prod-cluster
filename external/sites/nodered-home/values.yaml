route:
  main:
    kind: HTTPRoute
    rules:
    - matches:
      - path:
          value: /
          type: PathPrefix
      backendRefs:
      - kind: Service
        identifier: main
        port: 1880
        group: ""
        weight: 1
    hostnames:
    - nodered.mattgerega.net
    parentRefs:
    - kind: Gateway
      name: main
      group: gateway.networking.k8s.io
      namespace: envoy-gateway-system
    enabled: true
controllers:
  main:
    strategy: Recreate
    revisionHistoryLimit: 3
    containers:
      main:
        strategy:
          type: Recreate
        image:
          repository: nodered/node-red
          tag: 5.0.0
          pullPolicy: IfNotPresent
        env:
          FLOWS: flows.json
          NODE_RED_ENABLE_SAFE_MODE: 
          TZ: America/New_York
          NODE_RED_ENABLE_PROJECTS: 
          NODE_OPTIONS: 
        probes:
          liveness:
            spec:
              initialDelaySeconds: 0
              periodSeconds: 10
              failureThreshold: 3
              timeoutSeconds: 1
            enabled: true
            custom: false
            type: TCP
          readiness:
            spec:
              initialDelaySeconds: 0
              periodSeconds: 10
              failureThreshold: 3
              timeoutSeconds: 1
            enabled: true
            custom: false
            type: TCP
          startup:
            spec:
              initialDelaySeconds: 0
              periodSeconds: 5
              failureThreshold: 30
              timeoutSeconds: 1
            enabled: true
            custom: false
            type: TCP
    replicas: 1
    type: deployment
    enabled: true
service:
  main:
    controller: main
    primary: true
    ports:
      http:
        primary: true
        enabled: true
        port: 1880
    type: ClusterIP
persistence:
  data:
    storageClass: nfs-client
    size: 2Gi
    accessMode: ReadWriteMany
    type: persistentVolumeClaim
    enabled: true


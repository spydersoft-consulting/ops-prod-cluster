controllers:
  main:
    enabled: true
    type: deployment
    revisionHistoryLimit: 3
    replicas: 1
    strategy: Recreate
    containers:
      main:
        env:
          TZ: America/New_York
          NODE_RED_ENABLE_SAFE_MODE: 
          NODE_RED_ENABLE_PROJECTS: 
          NODE_OPTIONS: 
          FLOWS: flows.json
        probes:
          startup:
            type: TCP
            spec:
              failureThreshold: 30
              initialDelaySeconds: 0
              periodSeconds: 5
              timeoutSeconds: 1
            custom: false
            enabled: true
          readiness:
            type: TCP
            spec:
              failureThreshold: 3
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
            custom: false
            enabled: true
          liveness:
            type: TCP
            spec:
              failureThreshold: 3
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
            custom: false
            enabled: true
        image:
          pullPolicy: IfNotPresent
          tag: 5.0.1
          repository: nodered/node-red
        resources:
          requests:
            cpu: 5m
        strategy:
          type: Recreate
service:
  main:
    ports:
      http:
        port: 1880
        primary: true
        enabled: true
    primary: true
    controller: main
    type: ClusterIP
route:
  main:
    hostnames:
    - nodered.mattgerega.net
    kind: HTTPRoute
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - kind: Service
        weight: 1
        group: ""
        port: 1880
        identifier: main
    parentRefs:
    - namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      name: main
    enabled: true
persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: nfs-client
    size: 2Gi
    accessMode: ReadWriteMany


persistence:
  data:
    storageClass: nfs-client
    accessMode: ReadWriteMany
    enabled: true
    type: persistentVolumeClaim
    size: 2Gi
controllers:
  main:
    replicas: 1
    revisionHistoryLimit: 3
    containers:
      main:
        env:
          FLOWS: flows.json
          NODE_RED_ENABLE_PROJECTS: 
          TZ: America/New_York
          NODE_RED_ENABLE_SAFE_MODE: 
          NODE_OPTIONS: 
        image:
          tag: 4.1.6
          repository: nodered/node-red
          pullPolicy: IfNotPresent
        probes:
          startup:
            enabled: true
            type: TCP
            spec:
              timeoutSeconds: 1
              periodSeconds: 5
              initialDelaySeconds: 0
              failureThreshold: 30
            custom: false
          liveness:
            enabled: true
            type: TCP
            spec:
              timeoutSeconds: 1
              periodSeconds: 10
              initialDelaySeconds: 0
              failureThreshold: 3
            custom: false
          readiness:
            enabled: true
            type: TCP
            spec:
              timeoutSeconds: 1
              periodSeconds: 10
              initialDelaySeconds: 0
              failureThreshold: 3
            custom: false
        strategy:
          type: Recreate
    strategy: Recreate
    enabled: true
    type: deployment
route:
  main:
    hostnames:
    - nodered.mattgerega.net
    parentRefs:
    - name: main
      namespace: envoy-gateway-system
      kind: Gateway
      group: gateway.networking.k8s.io
    kind: HTTPRoute
    enabled: true
    rules:
    - matches:
      - path:
          value: /
          type: PathPrefix
      backendRefs:
      - port: 1880
        group: ""
        kind: Service
        weight: 1
        identifier: main
service:
  main:
    type: ClusterIP
    controller: main
    primary: true
    ports:
      http:
        enabled: true
        port: 1880
        primary: true


persistence:
  data:
    type: persistentVolumeClaim
    size: 2Gi
    storageClass: nfs-client
    enabled: true
    accessMode: ReadWriteMany
route:
  main:
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - identifier: main
        weight: 1
        group: ""
        kind: Service
        port: 1880
    kind: HTTPRoute
    enabled: true
    hostnames:
    - nodered.mattgerega.net
    parentRefs:
    - kind: Gateway
      name: main
      group: gateway.networking.k8s.io
      namespace: envoy-gateway-system
service:
  main:
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        primary: true
        port: 1880
    controller: main
controllers:
  main:
    revisionHistoryLimit: 3
    replicas: 1
    type: deployment
    strategy: Recreate
    containers:
      main:
        strategy:
          type: Recreate
        env:
          FLOWS: flows.json
          NODE_OPTIONS: 
          TZ: America/New_York
          NODE_RED_ENABLE_SAFE_MODE: 
          NODE_RED_ENABLE_PROJECTS: 
        probes:
          readiness:
            enabled: true
            custom: false
            type: TCP
            spec:
              periodSeconds: 10
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 3
          liveness:
            enabled: true
            custom: false
            type: TCP
            spec:
              periodSeconds: 10
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 3
          startup:
            enabled: true
            custom: false
            type: TCP
            spec:
              periodSeconds: 5
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 30
        image:
          pullPolicy: IfNotPresent
          tag: 4.1.10
          repository: nodered/node-red
    enabled: true


configMaps:
  n8n:
    data:
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
    enabled: true
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true
controllers:
  main:
    replicas: 1
    containers:
      main:
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        probes:
          liveness:
            enabled: true
            custom: false
            spec:
              timeoutSeconds: 1
              initialDelaySeconds: 0
              periodSeconds: 10
              failureThreshold: 3
            type: TCP
          startup:
            enabled: true
            custom: false
            spec:
              timeoutSeconds: 1
              initialDelaySeconds: 0
              periodSeconds: 5
              failureThreshold: 30
            type: TCP
          readiness:
            enabled: true
            custom: false
            spec:
              timeoutSeconds: 1
              initialDelaySeconds: 0
              periodSeconds: 10
              failureThreshold: 3
            type: TCP
        strategy:
          type: Recreate
        image:
          repository: n8nio/n8n
          pullPolicy: IfNotPresent
          tag: 2.15.0
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secrets
          name: DB_POSTGRESDB_USER
        - valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secrets
          name: DB_POSTGRESDB_PASSWORD
    strategy: Recreate
    revisionHistoryLimit: 3
    type: deployment
    initContainers:
      volume-permissions:
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        image:
          repository: busybox
          tag: 1.36
    enabled: true
  postgres:
    replicas: 1
    containers:
      main:
        envFrom:
        - secretRef:
            name: postgres-secrets
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        image:
          repository: postgres
          pullPolicy: IfNotPresent
          tag: 17
        strategy:
          type: Recreate
    strategy: Recreate
    revisionHistoryLimit: 3
    type: deployment
    enabled: true
persistence:
  data:
    size: 2Gi
    accessMode: ReadWriteMany
    storageClass: nfs-client
    type: persistentVolumeClaim
    enabled: true
    advancedMounts:
      main:
        main:
        - path: /home/node/.n8n
        volume-permissions:
        - path: /home/node/.n8n
  postgres-secrets:
    type: secret
    enabled: true
    name: postgres-secrets
  postgres-data:
    size: 300Gi
    accessMode: ReadWriteMany
    storageClass: nfs-client
    type: persistentVolumeClaim
    enabled: true
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
  postgres-init-data:
    advancedMounts:
      postgres:
        main:
        - path: /docker-entrypoint-initdb.d/init-n8n-user.sh
          subPath: init-data.sh
    enabled: true
    identifier: postgres-init-data
    type: configMap
route:
  main:
    rules:
    - matches:
      - path:
          value: /
          type: PathPrefix
      backendRefs:
      - kind: Service
        port: 5678
        identifier: main
        weight: 1
        group: ""
    kind: HTTPRoute
    parentRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      namespace: envoy-gateway-system
      name: main
    enabled: true
    hostnames:
    - n8n.mattgerega.com
service:
  main:
    controller: main
    ports:
      http:
        primary: true
        enabled: true
        port: 5678
    primary: true
    type: ClusterIP
  postgres:
    controller: postgres
    ports:
      postgres:
        enabled: true
        port: 5432
    primary: false
    type: ClusterIP


configMaps:
  n8n:
    enabled: true
    data:
      N8N_PROTOCOL: http
      N8N_PORT: "5678"
      N8N_RUNNERS_ENABLED: "true"
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
service:
  main:
    controller: main
    primary: true
    ports:
      http:
        primary: true
        enabled: true
        port: 5678
    type: ClusterIP
  postgres:
    controller: postgres
    primary: false
    ports:
      postgres:
        enabled: true
        port: 5432
    type: ClusterIP
persistence:
  postgres-secrets:
    name: postgres-secrets
    enabled: true
    type: secret
  data:
    storageClass: nfs-client
    size: 2Gi
    advancedMounts:
      main:
        main:
        - path: /home/node/.n8n
        volume-permissions:
        - path: /home/node/.n8n
    accessMode: ReadWriteMany
    type: persistentVolumeClaim
    enabled: true
  postgres-init-data:
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
    identifier: postgres-init-data
    enabled: true
    type: configMap
  postgres-data:
    storageClass: nfs-client
    size: 300Gi
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    accessMode: ReadWriteMany
    type: persistentVolumeClaim
    enabled: true
route:
  main:
    kind: HTTPRoute
    rules:
    - matches:
      - path:
          value: /
          type: PathPrefix
      backendRefs:
      - kind: Service
        identifier: main
        port: 5678
        group: ""
        weight: 1
    hostnames:
    - n8n.mattgerega.com
    parentRefs:
    - name: main
      kind: Gateway
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
    enabled: true
controllers:
  main:
    initContainers:
      volume-permissions:
        image:
          repository: busybox
          tag: 1.36
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        volumeMounts:
        - name: '{{ .Release.Name }}-data'
          mountPath: /home/node/.n8n
    strategy: Recreate
    revisionHistoryLimit: 3
    containers:
      main:
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        env:
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          value: '{{ .Release.Name }}-postgres'
        - name: DB_POSTGRESDB_PORT
          value: 5432
        - name: DB_POSTGRESDB_DATABASE
          value: n8n
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secrets
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secrets
        image:
          repository: n8nio/n8n
          tag: 2.25.6
          pullPolicy: IfNotPresent
        strategy:
          type: Recreate
        probes:
          liveness:
            enabled: true
            spec:
              initialDelaySeconds: 0
              periodSeconds: 10
              failureThreshold: 3
              timeoutSeconds: 1
            custom: false
            type: TCP
          readiness:
            enabled: true
            spec:
              initialDelaySeconds: 0
              periodSeconds: 10
              failureThreshold: 3
              timeoutSeconds: 1
            custom: false
            type: TCP
          startup:
            enabled: true
            spec:
              initialDelaySeconds: 0
              periodSeconds: 5
              failureThreshold: 30
              timeoutSeconds: 1
            custom: false
            type: TCP
    replicas: 1
    type: deployment
    enabled: true
  postgres:
    strategy: Recreate
    revisionHistoryLimit: 3
    containers:
      main:
        strategy:
          type: Recreate
        image:
          repository: postgres
          tag: 17
          pullPolicy: IfNotPresent
        env:
        - name: POSTGRES_PORT
          value: 5432
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: n8n
        envFrom:
        - secretRef:
            name: postgres-secrets
    replicas: 1
    type: deployment
    enabled: true


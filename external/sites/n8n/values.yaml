service:
  main:
    type: ClusterIP
    controller: main
    ports:
      http:
        enabled: true
        port: 5678
        primary: true
    primary: true
  postgres:
    type: ClusterIP
    controller: postgres
    ports:
      postgres:
        enabled: true
        port: 5432
    primary: false
controllers:
  main:
    initContainers:
      volume-permissions:
        volumeMounts:
        - name: '{{ .Release.Name }}-data'
          mountPath: /home/node/.n8n
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        image:
          repository: busybox
          tag: 1.36
    containers:
      main:
        image:
          pullPolicy: IfNotPresent
          repository: n8nio/n8n
          tag: 2.25.7
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
          name: DB_POSTGRESDB_USER
        - valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
          name: DB_POSTGRESDB_PASSWORD
        probes:
          startup:
            custom: false
            enabled: true
            spec:
              timeoutSeconds: 1
              failureThreshold: 30
              initialDelaySeconds: 0
              periodSeconds: 5
            type: TCP
          liveness:
            custom: false
            enabled: true
            spec:
              timeoutSeconds: 1
              failureThreshold: 3
              initialDelaySeconds: 0
              periodSeconds: 10
            type: TCP
          readiness:
            custom: false
            enabled: true
            spec:
              timeoutSeconds: 1
              failureThreshold: 3
              initialDelaySeconds: 0
              periodSeconds: 10
            type: TCP
        strategy:
          type: Recreate
    enabled: true
    revisionHistoryLimit: 3
    replicas: 1
    strategy: Recreate
    type: deployment
  postgres:
    replicas: 1
    containers:
      main:
        envFrom:
        - secretRef:
            name: postgres-secrets
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        strategy:
          type: Recreate
        image:
          pullPolicy: IfNotPresent
          repository: postgres
          tag: 17
    enabled: true
    revisionHistoryLimit: 3
    strategy: Recreate
    type: deployment
route:
  main:
    parentRefs:
    - group: gateway.networking.k8s.io
      name: main
      kind: Gateway
      namespace: envoy-gateway-system
    enabled: true
    kind: HTTPRoute
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - weight: 1
        identifier: main
        group: ""
        kind: Service
        port: 5678
    hostnames:
    - n8n.mattgerega.com
persistence:
  postgres-data:
    accessMode: ReadWriteMany
    size: 300Gi
    storageClass: nfs-client
    enabled: true
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    type: persistentVolumeClaim
  postgres-init-data:
    enabled: true
    type: configMap
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
    identifier: postgres-init-data
  data:
    accessMode: ReadWriteMany
    size: 2Gi
    storageClass: nfs-client
    enabled: true
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    type: persistentVolumeClaim
  postgres-secrets:
    enabled: true
    type: secret
    name: postgres-secrets
configMaps:
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
  n8n:
    enabled: true
    data:
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"


route:
  main:
    hostnames:
    - n8n.mattgerega.com
    rules:
    - backendRefs:
      - port: 5678
        group: ""
        weight: 1
        identifier: main
        kind: Service
      matches:
      - path:
          value: /
          type: PathPrefix
    parentRefs:
    - name: main
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
    enabled: true
    kind: HTTPRoute
persistence:
  postgres-data:
    type: persistentVolumeClaim
    size: 300Gi
    accessMode: ReadWriteMany
    storageClass: nfs-client
    enabled: true
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
  postgres-secrets:
    name: postgres-secrets
    enabled: true
    type: secret
  postgres-init-data:
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
    enabled: true
    identifier: postgres-init-data
    type: configMap
  data:
    type: persistentVolumeClaim
    size: 2Gi
    accessMode: ReadWriteMany
    storageClass: nfs-client
    enabled: true
    advancedMounts:
      main:
        main:
        - path: /home/node/.n8n
        volume-permissions:
        - path: /home/node/.n8n
service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: 5678
        primary: true
    primary: true
  postgres:
    controller: postgres
    type: ClusterIP
    ports:
      postgres:
        port: 5432
        enabled: true
    primary: false
controllers:
  main:
    revisionHistoryLimit: 3
    strategy: Recreate
    type: deployment
    replicas: 1
    containers:
      main:
        probes:
          readiness:
            custom: false
            enabled: true
            type: TCP
            spec:
              initialDelaySeconds: 0
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 1
          liveness:
            custom: false
            enabled: true
            type: TCP
            spec:
              initialDelaySeconds: 0
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 1
          startup:
            custom: false
            enabled: true
            type: TCP
            spec:
              initialDelaySeconds: 0
              failureThreshold: 30
              periodSeconds: 5
              timeoutSeconds: 1
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        strategy:
          type: Recreate
        image:
          repository: n8nio/n8n
          tag: 2.10.2
          pullPolicy: IfNotPresent
        env:
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          value: '{{ .Release.Name }}-postgres'
        - name: DB_POSTGRESDB_PORT
          value: 5432
        - name: DB_POSTGRESDB_DATABASE
          value: n8n
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secrets
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secrets
    enabled: true
    initContainers:
      volume-permissions:
        image:
          repository: busybox
          tag: 1.36
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        volumeMounts:
        - name: '{{ .Release.Name }}-data'
          mountPath: /home/node/.n8n
  postgres:
    revisionHistoryLimit: 3
    strategy: Recreate
    type: deployment
    replicas: 1
    enabled: true
    containers:
      main:
        env:
        - name: POSTGRES_PORT
          value: 5432
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: n8n
        strategy:
          type: Recreate
        image:
          repository: postgres
          tag: 17
          pullPolicy: IfNotPresent
        envFrom:
        - secretRef:
            name: postgres-secrets
configMaps:
  n8n:
    enabled: true
    data:
      N8N_PROTOCOL: http
      N8N_PORT: "5678"
      N8N_RUNNERS_ENABLED: "true"
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi


configMaps:
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true
  n8n:
    data:
      N8N_RUNNERS_ENABLED: "true"
      N8N_PROTOCOL: http
      N8N_PORT: "5678"
    enabled: true
persistence:
  postgres-secrets:
    name: postgres-secrets
    type: secret
    enabled: true
  data:
    storageClass: nfs-client
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    enabled: true
    size: 2Gi
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
  postgres-data:
    storageClass: nfs-client
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    enabled: true
    size: 300Gi
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
  postgres-init-data:
    type: configMap
    advancedMounts:
      postgres:
        main:
        - path: /docker-entrypoint-initdb.d/init-n8n-user.sh
          subPath: init-data.sh
    identifier: postgres-init-data
    enabled: true
route:
  main:
    rules:
    - backendRefs:
      - group: ""
        weight: 1
        kind: Service
        identifier: main
        port: 5678
      matches:
      - path:
          value: /
          type: PathPrefix
    enabled: true
    kind: HTTPRoute
    parentRefs:
    - group: gateway.networking.k8s.io
      name: main
      namespace: envoy-gateway-system
      kind: Gateway
    hostnames:
    - n8n.mattgerega.com
controllers:
  postgres:
    strategy: Recreate
    containers:
      main:
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        envFrom:
        - secretRef:
            name: postgres-secrets
        image:
          pullPolicy: IfNotPresent
          tag: 17
          repository: postgres
        strategy:
          type: Recreate
    enabled: true
    revisionHistoryLimit: 3
    type: deployment
    replicas: 1
  main:
    initContainers:
      volume-permissions:
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        volumeMounts:
        - name: '{{ .Release.Name }}-data'
          mountPath: /home/node/.n8n
        image:
          tag: 1.36
          repository: busybox
    strategy: Recreate
    containers:
      main:
        probes:
          startup:
            spec:
              periodSeconds: 5
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 30
            custom: false
            type: TCP
            enabled: true
          readiness:
            spec:
              periodSeconds: 10
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 3
            custom: false
            type: TCP
            enabled: true
          liveness:
            spec:
              periodSeconds: 10
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 3
            custom: false
            type: TCP
            enabled: true
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
          name: DB_POSTGRESDB_USER
        - valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
          name: DB_POSTGRESDB_PASSWORD
        strategy:
          type: Recreate
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        image:
          pullPolicy: IfNotPresent
          tag: 2.29.10
          repository: n8nio/n8n
    enabled: true
    revisionHistoryLimit: 3
    type: deployment
    replicas: 1
service:
  postgres:
    type: ClusterIP
    ports:
      postgres:
        port: 5432
        enabled: true
    controller: postgres
    primary: false
  main:
    type: ClusterIP
    ports:
      http:
        port: 5678
        enabled: true
        primary: true
    controller: main
    primary: true


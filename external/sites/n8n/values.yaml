controllers:
  main:
    revisionHistoryLimit: 3
    enabled: true
    strategy: Recreate
    initContainers:
      volume-permissions:
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        image:
          repository: busybox
          tag: 1.36
    replicas: 1
    containers:
      main:
        env:
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          value: '{{ .Release.Name }}-postgres'
        - name: DB_POSTGRESDB_PORT
          value: 5432
        - name: DB_POSTGRESDB_DATABASE
          value: n8n
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
        probes:
          startup:
            type: TCP
            custom: false
            spec:
              periodSeconds: 5
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 30
            enabled: true
          readiness:
            type: TCP
            custom: false
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
            enabled: true
          liveness:
            type: TCP
            custom: false
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
            enabled: true
        strategy:
          type: Recreate
        image:
          repository: n8nio/n8n
          tag: 2.14.2
          pullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
    type: deployment
  postgres:
    revisionHistoryLimit: 3
    enabled: true
    strategy: Recreate
    replicas: 1
    containers:
      main:
        image:
          repository: postgres
          tag: 17
          pullPolicy: IfNotPresent
        envFrom:
        - secretRef:
            name: postgres-secrets
        strategy:
          type: Recreate
        env:
        - name: POSTGRES_PORT
          value: 5432
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: n8n
    type: deployment
route:
  main:
    hostnames:
    - n8n.mattgerega.com
    parentRefs:
    - group: gateway.networking.k8s.io
      name: main
      kind: Gateway
      namespace: envoy-gateway-system
    kind: HTTPRoute
    enabled: true
    rules:
    - backendRefs:
      - identifier: main
        kind: Service
        weight: 1
        group: ""
        port: 5678
      matches:
      - path:
          type: PathPrefix
          value: /
configMaps:
  n8n:
    data:
      N8N_PROTOCOL: http
      N8N_PORT: "5678"
      N8N_RUNNERS_ENABLED: "true"
    enabled: true
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true
service:
  main:
    ports:
      http:
        port: 5678
        primary: true
        enabled: true
    primary: true
    type: ClusterIP
    controller: main
  postgres:
    ports:
      postgres:
        port: 5432
        enabled: true
    primary: false
    type: ClusterIP
    controller: postgres
persistence:
  data:
    advancedMounts:
      main:
        main:
        - path: /home/node/.n8n
        volume-permissions:
        - path: /home/node/.n8n
    storageClass: nfs-client
    enabled: true
    accessMode: ReadWriteMany
    size: 2Gi
    type: persistentVolumeClaim
  postgres-secrets:
    name: postgres-secrets
    enabled: true
    type: secret
  postgres-init-data:
    advancedMounts:
      postgres:
        main:
        - path: /docker-entrypoint-initdb.d/init-n8n-user.sh
          subPath: init-data.sh
    enabled: true
    type: configMap
    identifier: postgres-init-data
  postgres-data:
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    storageClass: nfs-client
    enabled: true
    accessMode: ReadWriteMany
    size: 300Gi
    type: persistentVolumeClaim


persistence:
  postgres-init-data:
    type: configMap
    enabled: true
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
    identifier: postgres-init-data
  postgres-secrets:
    type: secret
    enabled: true
    name: postgres-secrets
  postgres-data:
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    size: 300Gi
    storageClass: nfs-client
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    enabled: true
  data:
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    size: 2Gi
    storageClass: nfs-client
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    enabled: true
controllers:
  postgres:
    containers:
      main:
        image:
          pullPolicy: IfNotPresent
          repository: postgres
          tag: 17
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        envFrom:
        - secretRef:
            name: postgres-secrets
        strategy:
          type: Recreate
    revisionHistoryLimit: 3
    strategy: Recreate
    type: deployment
    replicas: 1
    enabled: true
  main:
    containers:
      main:
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secrets
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secrets
        probes:
          readiness:
            type: TCP
            enabled: true
            spec:
              timeoutSeconds: 1
              periodSeconds: 10
              initialDelaySeconds: 0
              failureThreshold: 3
            custom: false
          startup:
            type: TCP
            enabled: true
            spec:
              timeoutSeconds: 1
              periodSeconds: 5
              initialDelaySeconds: 0
              failureThreshold: 30
            custom: false
          liveness:
            type: TCP
            enabled: true
            spec:
              timeoutSeconds: 1
              periodSeconds: 10
              initialDelaySeconds: 0
              failureThreshold: 3
            custom: false
        image:
          pullPolicy: IfNotPresent
          repository: n8nio/n8n
          tag: 2.12.2
        strategy:
          type: Recreate
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
    revisionHistoryLimit: 3
    strategy: Recreate
    type: deployment
    replicas: 1
    initContainers:
      volume-permissions:
        image:
          tag: 1.36
          repository: busybox
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
    enabled: true
configMaps:
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
  n8n:
    enabled: true
    data:
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
route:
  main:
    parentRefs:
    - namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      name: main
    kind: HTTPRoute
    hostnames:
    - n8n.mattgerega.com
    rules:
    - backendRefs:
      - identifier: main
        kind: Service
        port: 5678
        weight: 1
        group: ""
      matches:
      - path:
          type: PathPrefix
          value: /
    enabled: true
service:
  postgres:
    type: ClusterIP
    controller: postgres
    primary: false
    ports:
      postgres:
        enabled: true
        port: 5432
  main:
    type: ClusterIP
    controller: main
    primary: true
    ports:
      http:
        enabled: true
        port: 5678
        primary: true


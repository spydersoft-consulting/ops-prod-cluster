controllers:
  postgres:
    type: deployment
    revisionHistoryLimit: 3
    containers:
      main:
        envFrom:
        - secretRef:
            name: postgres-secrets
        strategy:
          type: Recreate
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        image:
          pullPolicy: IfNotPresent
          tag: 17
          repository: postgres
    strategy: Recreate
    enabled: true
    replicas: 1
  main:
    type: deployment
    revisionHistoryLimit: 3
    containers:
      main:
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secrets
          name: DB_POSTGRESDB_USER
        - valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secrets
          name: DB_POSTGRESDB_PASSWORD
        probes:
          liveness:
            type: TCP
            spec:
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 1
              initialDelaySeconds: 0
            enabled: true
            custom: false
          startup:
            type: TCP
            spec:
              failureThreshold: 30
              periodSeconds: 5
              timeoutSeconds: 1
              initialDelaySeconds: 0
            enabled: true
            custom: false
          readiness:
            type: TCP
            spec:
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 1
              initialDelaySeconds: 0
            enabled: true
            custom: false
        image:
          pullPolicy: IfNotPresent
          tag: 2.10.4
          repository: n8nio/n8n
        strategy:
          type: Recreate
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
    strategy: Recreate
    enabled: true
    replicas: 1
    initContainers:
      volume-permissions:
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        image:
          tag: 1.36
          repository: busybox
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
route:
  main:
    parentRefs:
    - kind: Gateway
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      name: main
    kind: HTTPRoute
    hostnames:
    - n8n.mattgerega.com
    enabled: true
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - weight: 1
        identifier: main
        kind: Service
        port: 5678
        group: ""
persistence:
  data:
    type: persistentVolumeClaim
    storageClass: nfs-client
    accessMode: ReadWriteMany
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    enabled: true
    size: 2Gi
  postgres-secrets:
    enabled: true
    type: secret
    name: postgres-secrets
  postgres-init-data:
    identifier: postgres-init-data
    type: configMap
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
    enabled: true
  postgres-data:
    type: persistentVolumeClaim
    storageClass: nfs-client
    accessMode: ReadWriteMany
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    enabled: true
    size: 300Gi
configMaps:
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true
  n8n:
    data:
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
    enabled: true
service:
  postgres:
    type: ClusterIP
    controller: postgres
    ports:
      postgres:
        enabled: true
        port: 5432
    primary: false
  main:
    type: ClusterIP
    controller: main
    ports:
      http:
        enabled: true
        port: 5678
        primary: true
    primary: true


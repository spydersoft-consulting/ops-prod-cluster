configMaps:
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true
  n8n:
    data:
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
    enabled: true
persistence:
  data:
    accessMode: ReadWriteMany
    type: persistentVolumeClaim
    advancedMounts:
      main:
        main:
        - path: /home/node/.n8n
        volume-permissions:
        - path: /home/node/.n8n
    storageClass: nfs-client
    enabled: true
    size: 2Gi
  postgres-secrets:
    type: secret
    name: postgres-secrets
    enabled: true
  postgres-data:
    accessMode: ReadWriteMany
    type: persistentVolumeClaim
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    storageClass: nfs-client
    enabled: true
    size: 300Gi
  postgres-init-data:
    type: configMap
    enabled: true
    identifier: postgres-init-data
    advancedMounts:
      postgres:
        main:
        - path: /docker-entrypoint-initdb.d/init-n8n-user.sh
          subPath: init-data.sh
service:
  postgres:
    type: ClusterIP
    ports:
      postgres:
        port: 5432
        enabled: true
    controller: postgres
    primary: false
  main:
    type: ClusterIP
    ports:
      http:
        port: 5678
        enabled: true
        primary: true
    controller: main
    primary: true
controllers:
  postgres:
    type: deployment
    replicas: 1
    revisionHistoryLimit: 3
    enabled: true
    containers:
      main:
        strategy:
          type: Recreate
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        envFrom:
        - secretRef:
            name: postgres-secrets
        image:
          pullPolicy: IfNotPresent
          repository: postgres
          tag: 17
    strategy: Recreate
  main:
    type: deployment
    replicas: 1
    revisionHistoryLimit: 3
    enabled: true
    containers:
      main:
        probes:
          startup:
            type: TCP
            spec:
              timeoutSeconds: 1
              failureThreshold: 30
              initialDelaySeconds: 0
              periodSeconds: 5
            enabled: true
            custom: false
          readiness:
            type: TCP
            spec:
              timeoutSeconds: 1
              failureThreshold: 3
              initialDelaySeconds: 0
              periodSeconds: 10
            enabled: true
            custom: false
          liveness:
            type: TCP
            spec:
              timeoutSeconds: 1
              failureThreshold: 3
              initialDelaySeconds: 0
              periodSeconds: 10
            enabled: true
            custom: false
        image:
          pullPolicy: IfNotPresent
          repository: n8nio/n8n
          tag: 2.29.11
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        strategy:
          type: Recreate
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
    strategy: Recreate
    initContainers:
      volume-permissions:
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
        image:
          repository: busybox
          tag: 1.36
route:
  main:
    parentRefs:
    - namespace: envoy-gateway-system
      name: main
      kind: Gateway
      group: gateway.networking.k8s.io
    enabled: true
    kind: HTTPRoute
    rules:
    - backendRefs:
      - identifier: main
        weight: 1
        group: ""
        kind: Service
        port: 5678
      matches:
      - path:
          type: PathPrefix
          value: /
    hostnames:
    - n8n.mattgerega.com


configMaps:
  n8n:
    enabled: true
    data:
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
route:
  main:
    parentRefs:
    - namespace: envoy-gateway-system
      kind: Gateway
      name: main
      group: gateway.networking.k8s.io
    rules:
    - backendRefs:
      - port: 5678
        weight: 1
        kind: Service
        identifier: main
        group: ""
      matches:
      - path:
          value: /
          type: PathPrefix
    enabled: true
    kind: HTTPRoute
    hostnames:
    - n8n.mattgerega.com
controllers:
  postgres:
    containers:
      main:
        envFrom:
        - secretRef:
            name: postgres-secrets
        strategy:
          type: Recreate
        image:
          repository: postgres
          pullPolicy: IfNotPresent
          tag: 17
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
    type: deployment
    enabled: true
    replicas: 1
    strategy: Recreate
    revisionHistoryLimit: 3
  main:
    containers:
      main:
        image:
          repository: n8nio/n8n
          pullPolicy: IfNotPresent
          tag: 2.29.7
        probes:
          readiness:
            custom: false
            enabled: true
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
            type: TCP
          startup:
            custom: false
            enabled: true
            spec:
              periodSeconds: 5
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 30
            type: TCP
          liveness:
            custom: false
            enabled: true
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
            type: TCP
        strategy:
          type: Recreate
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secrets
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secrets
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
    type: deployment
    enabled: true
    replicas: 1
    strategy: Recreate
    initContainers:
      volume-permissions:
        image:
          repository: busybox
          tag: 1.36
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
    revisionHistoryLimit: 3
service:
  postgres:
    controller: postgres
    ports:
      postgres:
        enabled: true
        port: 5432
    primary: false
    type: ClusterIP
  main:
    controller: main
    ports:
      http:
        enabled: true
        primary: true
        port: 5678
    primary: true
    type: ClusterIP
persistence:
  postgres-secrets:
    name: postgres-secrets
    enabled: true
    type: secret
  postgres-data:
    type: persistentVolumeClaim
    enabled: true
    storageClass: nfs-client
    size: 300Gi
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    accessMode: ReadWriteMany
  postgres-init-data:
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
    type: configMap
    enabled: true
    identifier: postgres-init-data
  data:
    type: persistentVolumeClaim
    enabled: true
    storageClass: nfs-client
    size: 2Gi
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    accessMode: ReadWriteMany


service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 5678
        enabled: true
        primary: true
    primary: true
  postgres:
    controller: postgres
    type: ClusterIP
    ports:
      postgres:
        port: 5432
        enabled: true
    primary: false
controllers:
  main:
    revisionHistoryLimit: 3
    replicas: 1
    containers:
      main:
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        image:
          repository: n8nio/n8n
          pullPolicy: IfNotPresent
          tag: 2.11.4
        probes:
          readiness:
            type: TCP
            custom: false
            spec:
              timeoutSeconds: 1
              initialDelaySeconds: 0
              periodSeconds: 10
              failureThreshold: 3
            enabled: true
          startup:
            type: TCP
            custom: false
            spec:
              timeoutSeconds: 1
              initialDelaySeconds: 0
              periodSeconds: 5
              failureThreshold: 30
            enabled: true
          liveness:
            type: TCP
            custom: false
            spec:
              timeoutSeconds: 1
              initialDelaySeconds: 0
              periodSeconds: 10
              failureThreshold: 3
            enabled: true
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secrets
          name: DB_POSTGRESDB_USER
        - valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secrets
          name: DB_POSTGRESDB_PASSWORD
        strategy:
          type: Recreate
    enabled: true
    initContainers:
      volume-permissions:
        volumeMounts:
        - name: '{{ .Release.Name }}-data'
          mountPath: /home/node/.n8n
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        image:
          repository: busybox
          tag: 1.36
    strategy: Recreate
    type: deployment
  postgres:
    revisionHistoryLimit: 3
    replicas: 1
    containers:
      main:
        envFrom:
        - secretRef:
            name: postgres-secrets
        strategy:
          type: Recreate
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        image:
          repository: postgres
          pullPolicy: IfNotPresent
          tag: 17
    enabled: true
    strategy: Recreate
    type: deployment
persistence:
  postgres-secrets:
    type: secret
    enabled: true
    name: postgres-secrets
  postgres-data:
    size: 300Gi
    enabled: true
    accessMode: ReadWriteMany
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    type: persistentVolumeClaim
    storageClass: nfs-client
  data:
    size: 2Gi
    enabled: true
    accessMode: ReadWriteMany
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    type: persistentVolumeClaim
    storageClass: nfs-client
  postgres-init-data:
    type: configMap
    enabled: true
    identifier: postgres-init-data
    advancedMounts:
      postgres:
        main:
        - path: /docker-entrypoint-initdb.d/init-n8n-user.sh
          subPath: init-data.sh
configMaps:
  n8n:
    enabled: true
    data:
      N8N_PORT: "5678"
      N8N_RUNNERS_ENABLED: "true"
      N8N_PROTOCOL: http
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
route:
  main:
    parentRefs:
    - namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      name: main
      kind: Gateway
    enabled: true
    rules:
    - matches:
      - path:
          value: /
          type: PathPrefix
      backendRefs:
      - group: ""
        identifier: main
        port: 5678
        weight: 1
        kind: Service
    kind: HTTPRoute
    hostnames:
    - n8n.mattgerega.com


persistence:
  postgres-init-data:
    enabled: true
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
    identifier: postgres-init-data
    type: configMap
  data:
    storageClass: nfs-client
    accessMode: ReadWriteMany
    type: persistentVolumeClaim
    advancedMounts:
      main:
        main:
        - path: /home/node/.n8n
        volume-permissions:
        - path: /home/node/.n8n
    size: 2Gi
    enabled: true
  postgres-data:
    storageClass: nfs-client
    accessMode: ReadWriteMany
    type: persistentVolumeClaim
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    size: 300Gi
    enabled: true
  postgres-secrets:
    enabled: true
    name: postgres-secrets
    type: secret
service:
  main:
    controller: main
    ports:
      http:
        enabled: true
        port: 5678
        primary: true
    primary: true
    type: ClusterIP
  postgres:
    controller: postgres
    ports:
      postgres:
        enabled: true
        port: 5432
    primary: false
    type: ClusterIP
route:
  main:
    rules:
    - backendRefs:
      - port: 5678
        identifier: main
        group: ""
        weight: 1
        kind: Service
      matches:
      - path:
          type: PathPrefix
          value: /
    parentRefs:
    - name: main
      group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway-system
    enabled: true
    hostnames:
    - n8n.mattgerega.com
    kind: HTTPRoute
configMaps:
  n8n:
    enabled: true
    data:
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: "true"
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
controllers:
  main:
    type: deployment
    revisionHistoryLimit: 3
    replicas: 1
    containers:
      main:
        strategy:
          type: Recreate
        image:
          pullPolicy: IfNotPresent
          repository: n8nio/n8n
          tag: 2.19.2
        env:
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          value: '{{ .Release.Name }}-postgres'
        - name: DB_POSTGRESDB_PORT
          value: 5432
        - name: DB_POSTGRESDB_DATABASE
          value: n8n
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
        probes:
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              timeoutSeconds: 1
              initialDelaySeconds: 0
              periodSeconds: 5
            custom: false
            type: TCP
          liveness:
            enabled: true
            spec:
              failureThreshold: 3
              timeoutSeconds: 1
              initialDelaySeconds: 0
              periodSeconds: 10
            custom: false
            type: TCP
          readiness:
            enabled: true
            spec:
              failureThreshold: 3
              timeoutSeconds: 1
              initialDelaySeconds: 0
              periodSeconds: 10
            custom: false
            type: TCP
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
    strategy: Recreate
    initContainers:
      volume-permissions:
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        image:
          repository: busybox
          tag: 1.36
    enabled: true
  postgres:
    type: deployment
    revisionHistoryLimit: 3
    replicas: 1
    containers:
      main:
        envFrom:
        - secretRef:
            name: postgres-secrets
        env:
        - name: POSTGRES_PORT
          value: 5432
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: n8n
        strategy:
          type: Recreate
        image:
          pullPolicy: IfNotPresent
          repository: postgres
          tag: 17
    strategy: Recreate
    enabled: true


configMaps:
  n8n:
    data:
      N8N_RUNNERS_ENABLED: "true"
      N8N_PROTOCOL: http
      N8N_PORT: "5678"
    enabled: true
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true
service:
  postgres:
    type: ClusterIP
    primary: false
    controller: postgres
    ports:
      postgres:
        port: 5432
        enabled: true
  main:
    type: ClusterIP
    primary: true
    controller: main
    ports:
      http:
        port: 5678
        primary: true
        enabled: true
route:
  main:
    hostnames:
    - n8n.mattgerega.com
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - identifier: main
        port: 5678
        weight: 1
        kind: Service
        group: ""
    parentRefs:
    - namespace: envoy-gateway-system
      kind: Gateway
      name: main
      group: gateway.networking.k8s.io
    enabled: true
    kind: HTTPRoute
controllers:
  postgres:
    replicas: 1
    enabled: true
    strategy: Recreate
    revisionHistoryLimit: 3
    type: deployment
    containers:
      main:
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        envFrom:
        - secretRef:
            name: postgres-secrets
        strategy:
          type: Recreate
        image:
          tag: 17
          pullPolicy: IfNotPresent
          repository: postgres
  main:
    replicas: 1
    enabled: true
    strategy: Recreate
    initContainers:
      volume-permissions:
        image:
          tag: 1.36
          repository: busybox
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
    revisionHistoryLimit: 3
    type: deployment
    containers:
      main:
        probes:
          startup:
            type: TCP
            custom: false
            spec:
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 30
              periodSeconds: 5
            enabled: true
          readiness:
            type: TCP
            custom: false
            spec:
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 3
              periodSeconds: 10
            enabled: true
          liveness:
            type: TCP
            custom: false
            spec:
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 3
              periodSeconds: 10
            enabled: true
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
        image:
          tag: 2.23.4
          pullPolicy: IfNotPresent
          repository: n8nio/n8n
        strategy:
          type: Recreate
persistence:
  postgres-secrets:
    type: secret
    name: postgres-secrets
    enabled: true
  data:
    accessMode: ReadWriteMany
    size: 2Gi
    enabled: true
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    storageClass: nfs-client
    type: persistentVolumeClaim
  postgres-data:
    accessMode: ReadWriteMany
    size: 300Gi
    enabled: true
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    storageClass: nfs-client
    type: persistentVolumeClaim
  postgres-init-data:
    type: configMap
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
    identifier: postgres-init-data
    enabled: true


service:
  postgres:
    type: ClusterIP
    ports:
      postgres:
        enabled: true
        port: 5432
    controller: postgres
    primary: false
  main:
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: 5678
        primary: true
    controller: main
    primary: true
persistence:
  data:
    size: 2Gi
    storageClass: nfs-client
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
  postgres-data:
    size: 300Gi
    storageClass: nfs-client
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
  postgres-init-data:
    type: configMap
    enabled: true
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
    identifier: postgres-init-data
  postgres-secrets:
    type: secret
    enabled: true
    name: postgres-secrets
controllers:
  postgres:
    strategy: Recreate
    enabled: true
    containers:
      main:
        image:
          pullPolicy: IfNotPresent
          tag: 17
          repository: postgres
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        strategy:
          type: Recreate
        envFrom:
        - secretRef:
            name: postgres-secrets
    revisionHistoryLimit: 3
    type: deployment
    replicas: 1
  main:
    initContainers:
      volume-permissions:
        image:
          tag: 1.36
          repository: busybox
        volumeMounts:
        - name: '{{ .Release.Name }}-data'
          mountPath: /home/node/.n8n
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
    strategy: Recreate
    enabled: true
    containers:
      main:
        image:
          pullPolicy: IfNotPresent
          tag: 2.13.3
          repository: n8nio/n8n
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        strategy:
          type: Recreate
        probes:
          liveness:
            type: TCP
            enabled: true
            spec:
              periodSeconds: 10
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 3
            custom: false
          startup:
            type: TCP
            enabled: true
            spec:
              periodSeconds: 5
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 30
            custom: false
          readiness:
            type: TCP
            enabled: true
            spec:
              periodSeconds: 10
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 3
            custom: false
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
    revisionHistoryLimit: 3
    type: deployment
    replicas: 1
route:
  main:
    rules:
    - backendRefs:
      - group: ""
        identifier: main
        port: 5678
        kind: Service
        weight: 1
      matches:
      - path:
          type: PathPrefix
          value: /
    hostnames:
    - n8n.mattgerega.com
    enabled: true
    parentRefs:
    - group: gateway.networking.k8s.io
      name: main
      kind: Gateway
      namespace: envoy-gateway-system
    kind: HTTPRoute
configMaps:
  n8n:
    enabled: true
    data:
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi


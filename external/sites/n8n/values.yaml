persistence:
  data:
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    storageClass: nfs-client
    size: 2Gi
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    enabled: true
  postgres-secrets:
    enabled: true
    name: postgres-secrets
    type: secret
  postgres-init-data:
    enabled: true
    advancedMounts:
      postgres:
        main:
        - path: /docker-entrypoint-initdb.d/init-n8n-user.sh
          subPath: init-data.sh
    identifier: postgres-init-data
    type: configMap
  postgres-data:
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    storageClass: nfs-client
    size: 300Gi
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    enabled: true
service:
  postgres:
    controller: postgres
    primary: false
    ports:
      postgres:
        enabled: true
        port: 5432
    type: ClusterIP
  main:
    controller: main
    primary: true
    ports:
      http:
        enabled: true
        primary: true
        port: 5678
    type: ClusterIP
configMaps:
  n8n:
    enabled: true
    data:
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
route:
  main:
    kind: HTTPRoute
    parentRefs:
    - namespace: envoy-gateway-system
      name: main
      kind: Gateway
      group: gateway.networking.k8s.io
    hostnames:
    - n8n.mattgerega.com
    rules:
    - matches:
      - path:
          value: /
          type: PathPrefix
      backendRefs:
      - identifier: main
        kind: Service
        group: ""
        port: 5678
        weight: 1
    enabled: true
controllers:
  postgres:
    type: deployment
    revisionHistoryLimit: 3
    replicas: 1
    containers:
      main:
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        image:
          tag: 17
          pullPolicy: IfNotPresent
          repository: postgres
        envFrom:
        - secretRef:
            name: postgres-secrets
        strategy:
          type: Recreate
    enabled: true
    strategy: Recreate
  main:
    type: deployment
    revisionHistoryLimit: 3
    replicas: 1
    containers:
      main:
        image:
          tag: 2.9.4
          pullPolicy: IfNotPresent
          repository: n8nio/n8n
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        probes:
          liveness:
            custom: false
            type: TCP
            spec:
              initialDelaySeconds: 0
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 1
            enabled: true
          startup:
            custom: false
            type: TCP
            spec:
              initialDelaySeconds: 0
              failureThreshold: 30
              periodSeconds: 5
              timeoutSeconds: 1
            enabled: true
          readiness:
            custom: false
            type: TCP
            spec:
              initialDelaySeconds: 0
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 1
            enabled: true
        strategy:
          type: Recreate
    initContainers:
      volume-permissions:
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        image:
          tag: 1.36
          repository: busybox
        volumeMounts:
        - name: '{{ .Release.Name }}-data'
          mountPath: /home/node/.n8n
    enabled: true
    strategy: Recreate


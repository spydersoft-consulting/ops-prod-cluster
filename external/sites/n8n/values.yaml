service:
  postgres:
    primary: false
    type: ClusterIP
    ports:
      postgres:
        enabled: true
        port: 5432
    controller: postgres
  main:
    primary: true
    type: ClusterIP
    ports:
      http:
        primary: true
        enabled: true
        port: 5678
    controller: main
configMaps:
  n8n:
    data:
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
    enabled: true
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true
controllers:
  postgres:
    strategy: Recreate
    revisionHistoryLimit: 3
    enabled: true
    replicas: 1
    type: deployment
    containers:
      main:
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        envFrom:
        - secretRef:
            name: postgres-secrets
        image:
          repository: postgres
          tag: 17
          pullPolicy: IfNotPresent
        strategy:
          type: Recreate
  main:
    strategy: Recreate
    revisionHistoryLimit: 3
    enabled: true
    replicas: 1
    initContainers:
      volume-permissions:
        volumeMounts:
        - name: '{{ .Release.Name }}-data'
          mountPath: /home/node/.n8n
        image:
          repository: busybox
          tag: 1.36
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
    type: deployment
    containers:
      main:
        image:
          repository: n8nio/n8n
          tag: 2.28.6
          pullPolicy: IfNotPresent
        strategy:
          type: Recreate
        probes:
          startup:
            custom: false
            enabled: true
            type: TCP
            spec:
              periodSeconds: 5
              failureThreshold: 30
              initialDelaySeconds: 0
              timeoutSeconds: 1
          liveness:
            custom: false
            enabled: true
            type: TCP
            spec:
              periodSeconds: 10
              failureThreshold: 3
              initialDelaySeconds: 0
              timeoutSeconds: 1
          readiness:
            custom: false
            enabled: true
            type: TCP
            spec:
              periodSeconds: 10
              failureThreshold: 3
              initialDelaySeconds: 0
              timeoutSeconds: 1
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secrets
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secrets
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
persistence:
  postgres-secrets:
    enabled: true
    type: secret
    name: postgres-secrets
  postgres-data:
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    storageClass: nfs-client
    enabled: true
    size: 300Gi
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
  data:
    advancedMounts:
      main:
        main:
        - path: /home/node/.n8n
        volume-permissions:
        - path: /home/node/.n8n
    storageClass: nfs-client
    enabled: true
    size: 2Gi
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
  postgres-init-data:
    identifier: postgres-init-data
    enabled: true
    type: configMap
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
route:
  main:
    hostnames:
    - n8n.mattgerega.com
    enabled: true
    kind: HTTPRoute
    rules:
    - backendRefs:
      - weight: 1
        identifier: main
        port: 5678
        kind: Service
        group: ""
      matches:
      - path:
          type: PathPrefix
          value: /
    parentRefs:
    - name: main
      namespace: envoy-gateway-system
      kind: Gateway
      group: gateway.networking.k8s.io


persistence:
  data:
    size: 2Gi
    storageClass: nfs-client
    accessMode: ReadWriteMany
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    enabled: true
    type: persistentVolumeClaim
  postgres-secrets:
    type: secret
    name: postgres-secrets
    enabled: true
  postgres-data:
    size: 300Gi
    storageClass: nfs-client
    accessMode: ReadWriteMany
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    enabled: true
    type: persistentVolumeClaim
  postgres-init-data:
    type: configMap
    enabled: true
    identifier: postgres-init-data
    advancedMounts:
      postgres:
        main:
        - path: /docker-entrypoint-initdb.d/init-n8n-user.sh
          subPath: init-data.sh
controllers:
  main:
    containers:
      main:
        probes:
          liveness:
            type: TCP
            custom: false
            spec:
              failureThreshold: 3
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
            enabled: true
          readiness:
            type: TCP
            custom: false
            spec:
              failureThreshold: 3
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
            enabled: true
          startup:
            type: TCP
            custom: false
            spec:
              failureThreshold: 30
              periodSeconds: 5
              initialDelaySeconds: 0
              timeoutSeconds: 1
            enabled: true
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        env:
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          value: '{{ .Release.Name }}-postgres'
        - name: DB_POSTGRESDB_PORT
          value: 5432
        - name: DB_POSTGRESDB_DATABASE
          value: n8n
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
        image:
          pullPolicy: IfNotPresent
          tag: 2.21.8
          repository: n8nio/n8n
        strategy:
          type: Recreate
    strategy: Recreate
    initContainers:
      volume-permissions:
        image:
          tag: 1.36
          repository: busybox
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
    revisionHistoryLimit: 3
    replicas: 1
    enabled: true
    type: deployment
  postgres:
    containers:
      main:
        image:
          pullPolicy: IfNotPresent
          tag: 17
          repository: postgres
        env:
        - name: POSTGRES_PORT
          value: 5432
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: n8n
        envFrom:
        - secretRef:
            name: postgres-secrets
        strategy:
          type: Recreate
    enabled: true
    revisionHistoryLimit: 3
    replicas: 1
    strategy: Recreate
    type: deployment
configMaps:
  n8n:
    data:
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
    enabled: true
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true
service:
  main:
    type: ClusterIP
    controller: main
    primary: true
    ports:
      http:
        enabled: true
        primary: true
        port: 5678
  postgres:
    type: ClusterIP
    controller: postgres
    primary: false
    ports:
      postgres:
        enabled: true
        port: 5432
route:
  main:
    rules:
    - backendRefs:
      - kind: Service
        identifier: main
        group: ""
        port: 5678
        weight: 1
      matches:
      - path:
          type: PathPrefix
          value: /
    hostnames:
    - n8n.mattgerega.com
    parentRefs:
    - name: main
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
    enabled: true
    kind: HTTPRoute


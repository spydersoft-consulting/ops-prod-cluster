controllers:
  postgres:
    strategy: Recreate
    enabled: true
    replicas: 1
    containers:
      main:
        image:
          repository: postgres
          pullPolicy: IfNotPresent
          tag: 17
        env:
        - name: POSTGRES_PORT
          value: 5432
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: n8n
        strategy:
          type: Recreate
        envFrom:
        - secretRef:
            name: postgres-secrets
    type: deployment
    revisionHistoryLimit: 3
  main:
    strategy: Recreate
    enabled: true
    replicas: 1
    initContainers:
      volume-permissions:
        image:
          repository: busybox
          tag: 1.36
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
    containers:
      main:
        env:
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          value: '{{ .Release.Name }}-postgres'
        - name: DB_POSTGRESDB_PORT
          value: 5432
        - name: DB_POSTGRESDB_DATABASE
          value: n8n
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secrets
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secrets
        image:
          repository: n8nio/n8n
          pullPolicy: IfNotPresent
          tag: 2.29.8
        strategy:
          type: Recreate
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        probes:
          readiness:
            enabled: true
            custom: false
            type: TCP
            spec:
              timeoutSeconds: 1
              periodSeconds: 10
              failureThreshold: 3
              initialDelaySeconds: 0
          liveness:
            enabled: true
            custom: false
            type: TCP
            spec:
              timeoutSeconds: 1
              periodSeconds: 10
              failureThreshold: 3
              initialDelaySeconds: 0
          startup:
            enabled: true
            custom: false
            type: TCP
            spec:
              timeoutSeconds: 1
              periodSeconds: 5
              failureThreshold: 30
              initialDelaySeconds: 0
    type: deployment
    revisionHistoryLimit: 3
service:
  postgres:
    ports:
      postgres:
        enabled: true
        port: 5432
    primary: false
    type: ClusterIP
    controller: postgres
  main:
    ports:
      http:
        enabled: true
        primary: true
        port: 5678
    primary: true
    type: ClusterIP
    controller: main
configMaps:
  n8n:
    data:
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
    enabled: true
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true
route:
  main:
    rules:
    - matches:
      - path:
          value: /
          type: PathPrefix
      backendRefs:
      - weight: 1
        port: 5678
        group: ""
        kind: Service
        identifier: main
    enabled: true
    parentRefs:
    - group: gateway.networking.k8s.io
      name: main
      kind: Gateway
      namespace: envoy-gateway-system
    kind: HTTPRoute
    hostnames:
    - n8n.mattgerega.com
persistence:
  data:
    size: 2Gi
    enabled: true
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    accessMode: ReadWriteMany
    type: persistentVolumeClaim
    storageClass: nfs-client
  postgres-data:
    size: 300Gi
    enabled: true
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    accessMode: ReadWriteMany
    type: persistentVolumeClaim
    storageClass: nfs-client
  postgres-secrets:
    enabled: true
    name: postgres-secrets
    type: secret
  postgres-init-data:
    enabled: true
    identifier: postgres-init-data
    type: configMap
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh


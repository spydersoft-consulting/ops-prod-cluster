service:
  main:
    ports:
      http:
        primary: true
        enabled: true
        port: 5678
    primary: true
    type: ClusterIP
    controller: main
  postgres:
    ports:
      postgres:
        enabled: true
        port: 5432
    primary: false
    type: ClusterIP
    controller: postgres
controllers:
  main:
    initContainers:
      volume-permissions:
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        image:
          tag: 1.36
          repository: busybox
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
    revisionHistoryLimit: 3
    strategy: Recreate
    enabled: true
    type: deployment
    containers:
      main:
        probes:
          startup:
            enabled: true
            spec:
              periodSeconds: 5
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 30
            custom: false
            type: TCP
          liveness:
            enabled: true
            spec:
              periodSeconds: 10
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 3
            custom: false
            type: TCP
          readiness:
            enabled: true
            spec:
              periodSeconds: 10
              timeoutSeconds: 1
              initialDelaySeconds: 0
              failureThreshold: 3
            custom: false
            type: TCP
        strategy:
          type: Recreate
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
        env:
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          value: '{{ .Release.Name }}-postgres'
        - name: DB_POSTGRESDB_PORT
          value: 5432
        - name: DB_POSTGRESDB_DATABASE
          value: n8n
        - valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
          name: DB_POSTGRESDB_USER
        - valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
          name: DB_POSTGRESDB_PASSWORD
        image:
          pullPolicy: IfNotPresent
          tag: 2.23.2
          repository: n8nio/n8n
    replicas: 1
  postgres:
    revisionHistoryLimit: 3
    strategy: Recreate
    enabled: true
    type: deployment
    containers:
      main:
        envFrom:
        - secretRef:
            name: postgres-secrets
        image:
          pullPolicy: IfNotPresent
          tag: 17
          repository: postgres
        strategy:
          type: Recreate
        env:
        - name: POSTGRES_PORT
          value: 5432
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: n8n
    replicas: 1
persistence:
  postgres-secrets:
    name: postgres-secrets
    type: secret
    enabled: true
  postgres-data:
    accessMode: ReadWriteMany
    size: 300Gi
    storageClass: nfs-client
    enabled: true
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    type: persistentVolumeClaim
  data:
    accessMode: ReadWriteMany
    size: 2Gi
    storageClass: nfs-client
    enabled: true
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    type: persistentVolumeClaim
  postgres-init-data:
    identifier: postgres-init-data
    enabled: true
    type: configMap
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
configMaps:
  n8n:
    enabled: true
    data:
      N8N_RUNNERS_ENABLED: "true"
      N8N_PROTOCOL: http
      N8N_PORT: "5678"
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
route:
  main:
    kind: HTTPRoute
    enabled: true
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - kind: Service
        port: 5678
        group: ""
        identifier: main
        weight: 1
    hostnames:
    - n8n.mattgerega.com
    parentRefs:
    - group: gateway.networking.k8s.io
      name: main
      namespace: envoy-gateway-system
      kind: Gateway


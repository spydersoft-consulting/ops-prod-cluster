controllers:
  main:
    containers:
      main:
        env:
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          value: '{{ .Release.Name }}-postgres'
        - name: DB_POSTGRESDB_PORT
          value: 5432
        - name: DB_POSTGRESDB_DATABASE
          value: n8n
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
        image:
          repository: n8nio/n8n
          pullPolicy: IfNotPresent
          tag: 2.26.6
        probes:
          liveness:
            custom: false
            type: TCP
            enabled: true
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            custom: false
            type: TCP
            enabled: true
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
          startup:
            custom: false
            type: TCP
            enabled: true
            spec:
              periodSeconds: 5
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 30
        strategy:
          type: Recreate
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
    replicas: 1
    enabled: true
    revisionHistoryLimit: 3
    strategy: Recreate
    type: deployment
    initContainers:
      volume-permissions:
        image:
          repository: busybox
          tag: 1.36
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
        volumeMounts:
        - name: '{{ .Release.Name }}-data'
          mountPath: /home/node/.n8n
  postgres:
    containers:
      main:
        envFrom:
        - secretRef:
            name: postgres-secrets
        strategy:
          type: Recreate
        image:
          repository: postgres
          pullPolicy: IfNotPresent
          tag: 17
        env:
        - name: POSTGRES_PORT
          value: 5432
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: n8n
    replicas: 1
    enabled: true
    revisionHistoryLimit: 3
    strategy: Recreate
    type: deployment
persistence:
  postgres-init-data:
    identifier: postgres-init-data
    advancedMounts:
      postgres:
        main:
        - path: /docker-entrypoint-initdb.d/init-n8n-user.sh
          subPath: init-data.sh
    type: configMap
    enabled: true
  data:
    type: persistentVolumeClaim
    size: 2Gi
    enabled: true
    storageClass: nfs-client
    advancedMounts:
      main:
        main:
        - path: /home/node/.n8n
        volume-permissions:
        - path: /home/node/.n8n
    accessMode: ReadWriteMany
  postgres-data:
    type: persistentVolumeClaim
    size: 300Gi
    enabled: true
    storageClass: nfs-client
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    accessMode: ReadWriteMany
  postgres-secrets:
    name: postgres-secrets
    type: secret
    enabled: true
route:
  main:
    enabled: true
    parentRefs:
    - group: gateway.networking.k8s.io
      name: main
      namespace: envoy-gateway-system
      kind: Gateway
    hostnames:
    - n8n.mattgerega.com
    rules:
    - matches:
      - path:
          value: /
          type: PathPrefix
      backendRefs:
      - weight: 1
        group: ""
        port: 5678
        identifier: main
        kind: Service
    kind: HTTPRoute
service:
  main:
    ports:
      http:
        port: 5678
        primary: true
        enabled: true
    controller: main
    primary: true
    type: ClusterIP
  postgres:
    ports:
      postgres:
        port: 5432
        enabled: true
    controller: postgres
    primary: false
    type: ClusterIP
configMaps:
  n8n:
    data:
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: "true"
      N8N_PORT: "5678"
    enabled: true
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true


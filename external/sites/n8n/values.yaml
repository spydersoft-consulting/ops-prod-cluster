service:
  postgres:
    primary: false
    type: ClusterIP
    ports:
      postgres:
        enabled: true
        port: 5432
    controller: postgres
  main:
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: 5678
        primary: true
    controller: main
persistence:
  postgres-init-data:
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-n8n-user.sh
    enabled: true
    type: configMap
    identifier: postgres-init-data
  postgres-data:
    enabled: true
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    type: persistentVolumeClaim
    size: 300Gi
    storageClass: nfs-client
    accessMode: ReadWriteMany
  data:
    enabled: true
    advancedMounts:
      main:
        volume-permissions:
        - path: /home/node/.n8n
        main:
        - path: /home/node/.n8n
    type: persistentVolumeClaim
    size: 2Gi
    storageClass: nfs-client
    accessMode: ReadWriteMany
  postgres-secrets:
    enabled: true
    type: secret
    name: postgres-secrets
route:
  main:
    enabled: true
    kind: HTTPRoute
    rules:
    - backendRefs:
      - kind: Service
        weight: 1
        port: 5678
        group: ""
        identifier: main
      matches:
      - path:
          value: /
          type: PathPrefix
    hostnames:
    - n8n.mattgerega.com
    parentRefs:
    - name: main
      kind: Gateway
      group: gateway.networking.k8s.io
      namespace: envoy-gateway-system
configMaps:
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
  n8n:
    enabled: true
    data:
      N8N_PROTOCOL: http
      N8N_PORT: "5678"
      N8N_RUNNERS_ENABLED: "true"
controllers:
  postgres:
    enabled: true
    containers:
      main:
        image:
          tag: 17
          repository: postgres
          pullPolicy: IfNotPresent
        strategy:
          type: Recreate
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: n8n
          name: POSTGRES_DB
        envFrom:
        - secretRef:
            name: postgres-secrets
    replicas: 1
    strategy: Recreate
    revisionHistoryLimit: 3
    type: deployment
  main:
    initContainers:
      volume-permissions:
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: '{{ .Release.Name }}-data'
        image:
          tag: 1.36
          repository: busybox
        command:
        - sh
        - -c
        - chown 1000:1000 /home/node/.n8n
    containers:
      main:
        probes:
          readiness:
            custom: false
            enabled: true
            type: TCP
            spec:
              failureThreshold: 3
              initialDelaySeconds: 0
              timeoutSeconds: 1
              periodSeconds: 10
          startup:
            custom: false
            enabled: true
            type: TCP
            spec:
              failureThreshold: 30
              initialDelaySeconds: 0
              timeoutSeconds: 1
              periodSeconds: 5
          liveness:
            custom: false
            enabled: true
            type: TCP
            spec:
              failureThreshold: 3
              initialDelaySeconds: 0
              timeoutSeconds: 1
              periodSeconds: 10
        image:
          tag: 2.9.2
          repository: n8nio/n8n
          pullPolicy: IfNotPresent
        env:
        - value: postgresdb
          name: DB_TYPE
        - value: '{{ .Release.Name }}-postgres'
          name: DB_POSTGRESDB_HOST
        - value: 5432
          name: DB_POSTGRESDB_PORT
        - value: n8n
          name: DB_POSTGRESDB_DATABASE
        - valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_USER
          name: DB_POSTGRESDB_USER
        - valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_NON_ROOT_PASSWORD
          name: DB_POSTGRESDB_PASSWORD
        strategy:
          type: Recreate
        envFrom:
        - configMapRef:
            name: '{{ .Release.Name }}'
    replicas: 1
    strategy: Recreate
    revisionHistoryLimit: 3
    enabled: true
    type: deployment


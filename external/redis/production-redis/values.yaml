controllers:
  main:
    enabled: true
    replicas: 1
    initContainers:
      init-permissions:
        resources:
          requests:
            memory: 10Mi
            cpu: 10m
          limits:
            memory: 20Mi
            cpu: 20m
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        image:
          repository: busybox
          pullPolicy: IfNotPresent
          tag: 1.36
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          chown -R 1001:1001 /data
          chmod -R 755 /data
    containers:
      redis-exporter:
        resources:
          requests:
            memory: 25Mi
            cpu: 25m
          limits:
            memory: 50Mi
            cpu: 50m
        env:
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                key: redis-password
                name: redis-secrets
          REDIS_ADDR: redis://localhost:6379
        image:
          repository: oliver006/redis_exporter
          pullPolicy: IfNotPresent
          tag: v1.62.0
      main:
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          exec redis-server /etc/redis/redis.conf \
            --requirepass "$REDIS_PASSWORD" \
            --masterauth "$REDIS_PASSWORD"
        env:
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                key: redis-password
                name: redis-secrets
          TZ: UTC
        image:
          repository: redis/redis-stack-server
          pullPolicy: IfNotPresent
          tag: 7.4.0-v8
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
        resources:
          requests:
            memory: 100Mi
            cpu: 50m
          limits:
            memory: 200Mi
            cpu: 100m
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              initialDelaySeconds: 20
              successThreshold: 1
              periodSeconds: 5
              timeoutSeconds: 2
              failureThreshold: 5
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
          liveness:
            enabled: true
            custom: true
            spec:
              initialDelaySeconds: 20
              successThreshold: 1
              periodSeconds: 5
              timeoutSeconds: 6
              failureThreshold: 5
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
          startup:
            enabled: true
            custom: true
            spec:
              initialDelaySeconds: 0
              periodSeconds: 5
              timeoutSeconds: 1
              failureThreshold: 30
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
    pod:
      securityContext:
        fsGroupChangePolicy: Always
        fsGroup: 1001
    type: statefulset
    revisionHistoryLimit: 3
podDisruptionBudget:
  main:
    enabled: true
    maxUnavailable: 1
    controller: main
serviceAccount:
  automount: false
  name: production-redis-master
  create: true
configMaps:
  redis-config:
    data:
      redis.conf: |
        # Network
        port 6379
        bind 0.0.0.0

        # Authentication - will be overridden by environment variables
        # requirepass will be set via REDISCLI_AUTH environment variable
        # masterauth will be set via REDISCLI_AUTH environment variable

        # Persistence
        dir /data
        appendonly yes
        save ""

        # Security - disable dangerous commands
        # rename-command FLUSHDB ""
        # rename-command FLUSHALL ""

        # Redis Stack Modules
        loadmodule /opt/redis-stack/lib/redisearch.so MAXSEARCHRESULTS 10000 MAXAGGREGATERESULTS 10000
        loadmodule /opt/redis-stack/lib/redistimeseries.so
        loadmodule /opt/redis-stack/lib/rejson.so
        loadmodule /opt/redis-stack/lib/redisbloom.so
    enabled: true
service:
  headless:
    enabled: true
    ports:
      redis:
        protocol: TCP
        enabled: true
        targetPort: 6379
        port: 6379
    controller: main
    clusterIP: None
    type: ClusterIP
  main:
    primary: true
    ports:
      metrics:
        protocol: TCP
        enabled: true
        targetPort: 9121
        port: 9121
      redis:
        port: 6379
        enabled: true
        protocol: TCP
        primary: true
        targetPort: 6379
    annotations:
      metrics.spydersoft.io/path: /metrics
      metrics.spydersoft.io/port: "9121"
      config.linkerd.io/opaque-ports: "6379"
      metrics.spydersoft.io/scrape: "true"
    controller: main
    type: ClusterIP
networkPolicies:
  main:
    policyTypes:
    - Ingress
    - Egress
    enabled: true
    controller: main
    rules:
      ingress:
      - ports:
        - protocol: TCP
          port: 6379
        from: []
      - ports:
        - protocol: TCP
          port: 4143
        from: []
      egress:
      - to: []
environment: production
persistence:
  data:
    retain: true
    enabled: true
    size: 8Gi
    advancedMounts:
      main:
        init-permissions:
        - path: /data
          readOnly: false
        main:
        - path: /data
          readOnly: false
    accessMode: ReadWriteOnce
    type: persistentVolumeClaim
    storageClass: nfs-client
  redis-config:
    enabled: true
    identifier: redis-config
    type: configMap
    advancedMounts:
      main:
        main:
        - path: /etc/redis
          readOnly: true


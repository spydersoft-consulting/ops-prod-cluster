networkPolicies:
  main:
    policyTypes:
    - Ingress
    - Egress
    rules:
      ingress:
      - from: []
        ports:
        - protocol: TCP
          port: 6379
      - from: []
        ports:
        - protocol: TCP
          port: 4143
      egress:
      - to: []
    controller: main
    enabled: true
persistence:
  redis-config:
    type: configMap
    identifier: redis-config
    advancedMounts:
      main:
        main:
        - path: /etc/redis
          readOnly: true
    enabled: true
  data:
    storageClass: nfs-client
    type: persistentVolumeClaim
    advancedMounts:
      main:
        main:
        - path: /data
          readOnly: false
        init-permissions:
        - path: /data
          readOnly: false
    size: 8Gi
    retain: true
    enabled: true
    accessMode: ReadWriteOnce
controllers:
  main:
    replicas: 1
    type: statefulset
    containers:
      redis-exporter:
        resources:
          requests:
            memory: 25Mi
            cpu: 25m
          limits:
            memory: 50Mi
            cpu: 50m
        env:
          REDIS_ADDR: redis://localhost:6379
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                key: redis-password
                name: redis-secrets
        image:
          repository: oliver006/redis_exporter
          tag: v1.62.0
          pullPolicy: IfNotPresent
      main:
        resources:
          requests:
            memory: 100Mi
            cpu: 50m
          limits:
            memory: 200Mi
            cpu: 100m
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
        probes:
          readiness:
            spec:
              timeoutSeconds: 2
              failureThreshold: 5
              initialDelaySeconds: 20
              periodSeconds: 5
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              successThreshold: 1
            custom: true
            enabled: true
          startup:
            spec:
              timeoutSeconds: 1
              failureThreshold: 30
              initialDelaySeconds: 0
              periodSeconds: 5
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
            custom: true
            enabled: true
          liveness:
            spec:
              timeoutSeconds: 6
              failureThreshold: 5
              initialDelaySeconds: 20
              periodSeconds: 5
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              successThreshold: 1
            custom: true
            enabled: true
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          exec redis-server /etc/redis/redis.conf \
            --requirepass "$REDIS_PASSWORD" \
            --masterauth "$REDIS_PASSWORD"
        image:
          repository: redis/redis-stack-server
          tag: 7.4.0-v8
          pullPolicy: IfNotPresent
        env:
          TZ: UTC
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                key: redis-password
                name: redis-secrets
    revisionHistoryLimit: 3
    initContainers:
      init-permissions:
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        resources:
          requests:
            memory: 10Mi
            cpu: 10m
          limits:
            memory: 20Mi
            cpu: 20m
        image:
          repository: busybox
          tag: 1.36
          pullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          chown -R 1001:1001 /data
          chmod -R 755 /data
    enabled: true
    pod:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: Always
environment: production
podDisruptionBudget:
  main:
    maxUnavailable: 1
    controller: main
    enabled: true
service:
  headless:
    type: ClusterIP
    ports:
      redis:
        protocol: TCP
        targetPort: 6379
        port: 6379
        enabled: true
    controller: main
    clusterIP: None
    enabled: true
  main:
    type: ClusterIP
    annotations:
      metrics.spydersoft.io/path: /metrics
      metrics.spydersoft.io/scrape: "true"
      metrics.spydersoft.io/port: "9121"
      config.linkerd.io/opaque-ports: "6379"
    ports:
      metrics:
        protocol: TCP
        targetPort: 9121
        port: 9121
        enabled: true
      redis:
        port: 6379
        targetPort: 6379
        primary: true
        enabled: true
        protocol: TCP
    controller: main
    primary: true
configMaps:
  redis-config:
    data:
      redis.conf: |
        # Network
        port 6379
        bind 0.0.0.0

        # Authentication - will be overridden by environment variables
        # requirepass will be set via REDISCLI_AUTH environment variable
        # masterauth will be set via REDISCLI_AUTH environment variable

        # Persistence
        dir /data
        appendonly yes
        save ""

        # Security - disable dangerous commands
        # rename-command FLUSHDB ""
        # rename-command FLUSHALL ""

        # Redis Stack Modules
        loadmodule /opt/redis-stack/lib/redisearch.so MAXSEARCHRESULTS 10000 MAXAGGREGATERESULTS 10000
        loadmodule /opt/redis-stack/lib/redistimeseries.so
        loadmodule /opt/redis-stack/lib/rejson.so
        loadmodule /opt/redis-stack/lib/redisbloom.so
    enabled: true
serviceAccount:
  name: production-redis-master
  automount: false
  create: true


environment: production
service:
  headless:
    clusterIP: None
    enabled: true
    type: ClusterIP
    ports:
      redis:
        port: 6379
        enabled: true
        targetPort: 6379
        protocol: TCP
    controller: main
  main:
    primary: true
    type: ClusterIP
    ports:
      metrics:
        port: 9121
        enabled: true
        targetPort: 9121
        protocol: TCP
      redis:
        enabled: true
        targetPort: 6379
        primary: true
        protocol: TCP
        port: 6379
    annotations:
      metrics.spydersoft.io/scrape: "true"
      metrics.spydersoft.io/port: "9121"
      metrics.spydersoft.io/path: /metrics
      config.linkerd.io/opaque-ports: "6379"
    controller: main
persistence:
  redis-config:
    identifier: redis-config
    enabled: true
    advancedMounts:
      main:
        main:
        - readOnly: true
          path: /etc/redis
    type: configMap
  data:
    accessMode: ReadWriteOnce
    storageClass: nfs-client
    retain: true
    enabled: true
    advancedMounts:
      main:
        init-permissions:
        - readOnly: false
          path: /data
        main:
        - readOnly: false
          path: /data
    type: persistentVolumeClaim
    size: 8Gi
podDisruptionBudget:
  main:
    maxUnavailable: 1
    enabled: true
    controller: main
networkPolicies:
  main:
    rules:
      ingress:
      - from: []
        ports:
        - port: 6379
          protocol: TCP
      - from: []
        ports:
        - port: 4143
          protocol: TCP
      egress:
      - to: []
    enabled: true
    controller: main
    policyTypes:
    - Ingress
    - Egress
configMaps:
  redis-config:
    enabled: true
    data:
      redis.conf: |
        # Network
        port 6379
        bind 0.0.0.0

        # Authentication - will be overridden by environment variables
        # requirepass will be set via REDISCLI_AUTH environment variable
        # masterauth will be set via REDISCLI_AUTH environment variable

        # Persistence
        dir /data
        appendonly yes
        save ""

        # Security - disable dangerous commands
        # rename-command FLUSHDB ""
        # rename-command FLUSHALL ""

        # Redis Stack Modules
        loadmodule /opt/redis-stack/lib/redisearch.so MAXSEARCHRESULTS 10000 MAXAGGREGATERESULTS 10000
        loadmodule /opt/redis-stack/lib/redistimeseries.so
        loadmodule /opt/redis-stack/lib/rejson.so
        loadmodule /opt/redis-stack/lib/redisbloom.so
serviceAccount:
  create: true
  name: production-redis-master
  automount: false
controllers:
  main:
    enabled: true
    initContainers:
      init-permissions:
        resources:
          limits:
            cpu: 20m
            memory: 20Mi
          requests:
            cpu: 10m
            memory: 10Mi
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          chown -R 1001:1001 /data
          chmod -R 755 /data
        securityContext:
          runAsGroup: 0
          runAsUser: 0
        image:
          repository: busybox
          tag: 1.36
          pullPolicy: IfNotPresent
    replicas: 1
    type: statefulset
    containers:
      redis-exporter:
        resources:
          limits:
            cpu: 50m
            memory: 50Mi
          requests:
            cpu: 25m
            memory: 25Mi
        env:
          REDIS_ADDR: redis://localhost:6379
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                key: redis-password
                name: redis-secrets
        image:
          repository: oliver006/redis_exporter
          tag: v1.62.0
          pullPolicy: IfNotPresent
      main:
        image:
          repository: redis/redis-stack-server
          tag: 7.4.0-v8
          pullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          exec redis-server /etc/redis/redis.conf \
            --requirepass "$REDIS_PASSWORD" \
            --masterauth "$REDIS_PASSWORD"
        env:
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                key: redis-password
                name: redis-secrets
          TZ: UTC
        resources:
          limits:
            cpu: 100m
            memory: 200Mi
          requests:
            cpu: 50m
            memory: 100Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        probes:
          liveness:
            spec:
              periodSeconds: 5
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              failureThreshold: 5
              timeoutSeconds: 6
              successThreshold: 1
              initialDelaySeconds: 20
            custom: true
            enabled: true
          startup:
            spec:
              periodSeconds: 5
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              failureThreshold: 30
              timeoutSeconds: 1
              initialDelaySeconds: 0
            custom: true
            enabled: true
          readiness:
            spec:
              periodSeconds: 5
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              failureThreshold: 5
              timeoutSeconds: 2
              successThreshold: 1
              initialDelaySeconds: 20
            custom: true
            enabled: true
    pod:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: Always
    revisionHistoryLimit: 10


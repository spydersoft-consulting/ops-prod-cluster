persistence:
  data:
    storageClass: nfs-client
    advancedMounts:
      main:
        init-permissions:
        - path: /data
          readOnly: false
        main:
        - path: /data
          readOnly: false
    size: 8Gi
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    retain: true
  redis-config:
    enabled: true
    advancedMounts:
      main:
        main:
        - path: /etc/redis
          readOnly: true
    identifier: redis-config
    type: configMap
controllers:
  main:
    initContainers:
      init-permissions:
        securityContext:
          runAsGroup: 0
          runAsUser: 0
        resources:
          limits:
            cpu: 20m
            memory: 20Mi
          requests:
            cpu: 10m
            memory: 10Mi
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          chown -R 1001:1001 /data
          chmod -R 755 /data
        image:
          pullPolicy: IfNotPresent
          repository: busybox
          tag: 1.36
    revisionHistoryLimit: 3
    pod:
      securityContext:
        fsGroupChangePolicy: Always
        fsGroup: 1001
    enabled: true
    containers:
      redis-exporter:
        resources:
          limits:
            cpu: 50m
            memory: 50Mi
          requests:
            cpu: 25m
            memory: 25Mi
        env:
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: redis-secrets
                key: redis-password
          REDIS_ADDR: redis://localhost:6379
        image:
          pullPolicy: IfNotPresent
          repository: oliver006/redis_exporter
          tag: v1.62.0
      main:
        image:
          pullPolicy: IfNotPresent
          repository: redis/redis-stack-server
          tag: 7.4.0-v8
        env:
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: redis-secrets
                key: redis-password
          TZ: UTC
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          exec redis-server /etc/redis/redis.conf \
            --requirepass "$REDIS_PASSWORD" \
            --masterauth "$REDIS_PASSWORD"
        resources:
          limits:
            cpu: 100m
            memory: 200Mi
          requests:
            cpu: 50m
            memory: 100Mi
        probes:
          startup:
            custom: true
            enabled: true
            spec:
              failureThreshold: 30
              timeoutSeconds: 1
              periodSeconds: 5
              initialDelaySeconds: 0
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
          readiness:
            custom: true
            enabled: true
            spec:
              failureThreshold: 5
              timeoutSeconds: 2
              successThreshold: 1
              periodSeconds: 5
              initialDelaySeconds: 20
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
          liveness:
            custom: true
            enabled: true
            spec:
              failureThreshold: 5
              timeoutSeconds: 6
              successThreshold: 1
              periodSeconds: 5
              initialDelaySeconds: 20
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
    replicas: 1
    type: statefulset
podDisruptionBudget:
  main:
    enabled: true
    controller: main
    maxUnavailable: 1
environment: production
networkPolicies:
  main:
    enabled: true
    policyTypes:
    - Ingress
    - Egress
    controller: main
    rules:
      ingress:
      - from: []
        ports:
        - port: 6379
          protocol: TCP
      - from: []
        ports:
        - port: 4143
          protocol: TCP
      egress:
      - to: []
serviceAccount:
  create: true
  name: production-redis-master
  automount: false
service:
  headless:
    enabled: true
    clusterIP: None
    controller: main
    ports:
      redis:
        enabled: true
        targetPort: 6379
        protocol: TCP
        port: 6379
    type: ClusterIP
  main:
    primary: true
    controller: main
    ports:
      metrics:
        enabled: true
        targetPort: 9121
        protocol: TCP
        port: 9121
      redis:
        primary: true
        enabled: true
        port: 6379
        targetPort: 6379
        protocol: TCP
    type: ClusterIP
    annotations:
      metrics.spydersoft.io/path: /metrics
      config.linkerd.io/opaque-ports: "6379"
      metrics.spydersoft.io/port: "9121"
      metrics.spydersoft.io/scrape: "true"
configMaps:
  redis-config:
    enabled: true
    data:
      redis.conf: |
        # Network
        port 6379
        bind 0.0.0.0

        # Authentication - will be overridden by environment variables
        # requirepass will be set via REDISCLI_AUTH environment variable
        # masterauth will be set via REDISCLI_AUTH environment variable

        # Persistence
        dir /data
        appendonly yes
        save ""

        # Security - disable dangerous commands
        # rename-command FLUSHDB ""
        # rename-command FLUSHALL ""

        # Redis Stack Modules
        loadmodule /opt/redis-stack/lib/redisearch.so MAXSEARCHRESULTS 10000 MAXAGGREGATERESULTS 10000
        loadmodule /opt/redis-stack/lib/redistimeseries.so
        loadmodule /opt/redis-stack/lib/rejson.so
        loadmodule /opt/redis-stack/lib/redisbloom.so


networkPolicies:
  main:
    rules:
      egress:
      - to: []
      ingress:
      - from: []
        ports:
        - protocol: TCP
          port: 6379
      - from: []
        ports:
        - protocol: TCP
          port: 4143
    enabled: true
    policyTypes:
    - Ingress
    - Egress
    controller: main
serviceAccount:
  create: true
  automount: false
  name: production-redis-master
podDisruptionBudget:
  main:
    enabled: true
    maxUnavailable: 1
    controller: main
configMaps:
  redis-config:
    data:
      redis.conf: |
        # Network
        port 6379
        bind 0.0.0.0

        # Authentication - will be overridden by environment variables
        # requirepass will be set via REDISCLI_AUTH environment variable
        # masterauth will be set via REDISCLI_AUTH environment variable

        # Persistence
        dir /data
        appendonly yes
        save ""

        # Security - disable dangerous commands
        # rename-command FLUSHDB ""
        # rename-command FLUSHALL ""

        # Redis Stack Modules
        loadmodule /opt/redis-stack/lib/redisearch.so MAXSEARCHRESULTS 10000 MAXAGGREGATERESULTS 10000
        loadmodule /opt/redis-stack/lib/redistimeseries.so
        loadmodule /opt/redis-stack/lib/rejson.so
        loadmodule /opt/redis-stack/lib/redisbloom.so
    enabled: true
environment: production
service:
  headless:
    enabled: true
    type: ClusterIP
    ports:
      redis:
        protocol: TCP
        enabled: true
        port: 6379
        targetPort: 6379
    clusterIP: None
    controller: main
  main:
    annotations:
      config.linkerd.io/opaque-ports: "6379"
      metrics.spydersoft.io/path: /metrics
      metrics.spydersoft.io/scrape: "true"
      metrics.spydersoft.io/port: "9121"
    primary: true
    type: ClusterIP
    ports:
      redis:
        enabled: true
        protocol: TCP
        primary: true
        port: 6379
        targetPort: 6379
      metrics:
        protocol: TCP
        enabled: true
        port: 9121
        targetPort: 9121
    controller: main
persistence:
  data:
    enabled: true
    advancedMounts:
      main:
        init-permissions:
        - readOnly: false
          path: /data
        main:
        - readOnly: false
          path: /data
    storageClass: nfs-client
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 8Gi
    retain: true
  redis-config:
    enabled: true
    advancedMounts:
      main:
        main:
        - readOnly: true
          path: /etc/redis
    identifier: redis-config
    type: configMap
controllers:
  main:
    enabled: true
    pod:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: Always
    revisionHistoryLimit: 10
    type: statefulset
    initContainers:
      init-permissions:
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          chown -R 1001:1001 /data
          chmod -R 755 /data
        image:
          repository: busybox
          pullPolicy: IfNotPresent
          tag: 1.36
        resources:
          requests:
            cpu: 10m
            memory: 10Mi
          limits:
            cpu: 20m
            memory: 20Mi
    containers:
      redis-exporter:
        env:
          REDIS_ADDR: redis://localhost:6379
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: redis-secrets
                key: redis-password
        image:
          repository: oliver006/redis_exporter
          pullPolicy: IfNotPresent
          tag: v1.62.0
        resources:
          requests:
            cpu: 25m
            memory: 25Mi
          limits:
            cpu: 50m
            memory: 50Mi
      main:
        env:
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: redis-secrets
                key: redis-password
          TZ: UTC
        probes:
          startup:
            spec:
              failureThreshold: 30
              initialDelaySeconds: 0
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              timeoutSeconds: 1
              periodSeconds: 5
            custom: true
            enabled: true
          readiness:
            spec:
              successThreshold: 1
              initialDelaySeconds: 20
              failureThreshold: 5
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              timeoutSeconds: 2
              periodSeconds: 5
            custom: true
            enabled: true
          liveness:
            spec:
              successThreshold: 1
              initialDelaySeconds: 20
              failureThreshold: 5
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              timeoutSeconds: 6
              periodSeconds: 5
            custom: true
            enabled: true
        resources:
          requests:
            cpu: 50m
            memory: 100Mi
          limits:
            cpu: 100m
            memory: 200Mi
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          exec redis-server /etc/redis/redis.conf \
            --requirepass "$REDIS_PASSWORD" \
            --masterauth "$REDIS_PASSWORD"
        image:
          repository: redis/redis-stack-server
          pullPolicy: IfNotPresent
          tag: 7.4.0-v8
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
    replicas: 1

